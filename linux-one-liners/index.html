<body>
  <main class="page">
    <header class="hero">
      <a class="back-link" href="../">← 返回首页</a>
      <h1>Linux 一句话脚本库</h1>
      <p>常用脚本集中维护，参数实时替换后可直接复制执行。</p>

    <section class="search-panel" aria-labelledby="search-title">

      <label class="visually-hidden" for="searchInput">搜索脚本名称、关键词或拼音</label>
      <div class="search-box">
        <input
          id="searchInput"
          type="search"
          autocomplete="off"
          placeholder="输入关键词/拼音/简拼，例如：runhttps、fxdl、反向代理"
        />
      </div>
      <p class="search-tip">支持中文、拼音、简拼和缺字模糊匹配。</p>
      <p id="resultTip" class="result-tip" aria-live="polite"></p>
    </section>

    <section aria-labelledby="scripts-title">
      <h2 id="scripts-title" class="visually-hidden">脚本列表</h2>
      <div id="cardGrid" class="cards" role="list"></div>
      <div id="emptyState" class="empty" hidden>没有匹配到脚本，试试关键词：runhttps、反向代理、日志。</div>
    </section>
  </main>
