<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writer 测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; background: #f8fafc; }
    h1 { margin-bottom: 16px; color: #0f172a; }
    .test-summary { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 16px; font-weight: 600; }
    .test-summary.all-pass { background: #dcfce7; color: #16a34a; }
    .test-summary.has-fail { background: #fee2e2; color: #dc2626; }
    .test-group { margin-bottom: 16px; }
    .test-group-title { font-size: 14px; font-weight: 700; color: #334155; padding: 8px 0; border-bottom: 1px solid #e2e8f0; margin-bottom: 4px; }
    .test-item { display: flex; align-items: flex-start; gap: 8px; padding: 4px 8px; font-size: 13px; }
    .test-item.pass { color: #16a34a; }
    .test-item.fail { color: #dc2626; }
    .test-icon { font-weight: bold; flex-shrink: 0; width: 18px; }
    .test-name { flex: 1; }
    .test-error { font-size: 12px; color: #dc2626; padding: 4px 8px 4px 34px; white-space: pre-wrap; background: #fef2f2; border-radius: 4px; margin: 2px 0 4px; }
    #test-log { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Writer 单元测试</h1>
  <div id="test-summary" class="test-summary">运行中...</div>
  <div id="test-log"></div>

  <!-- 模态容器 (测试 ui-modal 用) -->
  <div id="modal-container"></div>

  <!-- 类目管理器测试容器 -->
  <div id="test-category-container" style="display:none;">
    <div id="category-panel" class="panel panel-category">
      <div class="panel-header">
        <span class="panel-title">类目管理器</span>
        <button id="btn-add-root-category" class="btn-icon" title="添加大类">+</button>
      </div>
      <div id="category-tree" class="category-tree"></div>
    </div>
  </div>
  <div id="detail-panel" style="display:none;"></div>

  <!-- P20: 聊天面板测试容器 -->
  <div id="test-chat-container" style="display:none;">
    <div class="ai-status-bar"><span class="ai-status-toggle">▶</span><span class="ai-status-text">AI 空闲</span></div>
    <div class="chat-sections">
      <div class="chat-section expanded" data-section="outline">
        <div class="chat-section-title" style="display:flex;align-items:center;">
          <span style="flex:1;">▼ 情节概述</span>
          <span id="btn-clear-outline" class="btn-icon" title="清空并取消编辑" style="display:none;font-size:14px;cursor:pointer;">✕</span>
        </div>
        <div class="chat-section-body">
          <textarea id="input-outline" class="chat-textarea" placeholder="输入情节概述..."></textarea>
        </div>
      </div>
      <div class="chat-section" data-section="followUp">
        <div class="chat-section-title">▶ 后续概要</div>
        <div class="chat-section-body" style="display:none;">
          <textarea id="input-followUp" class="chat-textarea" placeholder="输入后续概要..."></textarea>
        </div>
      </div>
      <div class="chat-section" data-section="bindings">
        <div class="chat-section-title">▶ 绑定设定</div>
        <div class="chat-section-body" style="display:none;">
          <div id="binding-list" class="binding-list"></div>
        </div>
      </div>
      <div class="chat-section" data-section="outlineImport">
        <div class="chat-section-title">▶ 大纲导入</div>
        <div class="chat-section-body" style="display:none;">
          <textarea id="input-outline-import" class="chat-textarea" placeholder="粘贴大纲..."></textarea>
          <button id="btn-batch-generate" class="btn btn-sm btn-secondary">开始批量生成</button>
        </div>
      </div>
    </div>
    <div class="chat-style-tags">
      <div id="style-tags-container" class="style-tags-list"></div>
      <input id="style-tag-input" type="text" class="style-tag-input" placeholder="输入标签..." />
      <button id="btn-add-style-tag" class="style-tag-add-btn" title="添加标签">⊕</button>
    </div>
    <div class="chat-actions">
      <button id="btn-direct-add" class="btn btn-secondary">直接添加</button>
      <button id="btn-update-settings" class="btn btn-secondary">更新设定</button>
      <button id="btn-regenerate" class="btn btn-secondary" style="display:none;">重新生成</button>
      <button id="btn-generate" class="btn btn-primary">开始生成</button>
      <button id="btn-generate-chapter" class="btn btn-secondary">生成并结束本章</button>
    </div>
  </div>

  <!-- 加载样式 -->
  <link rel="stylesheet" href="style.css">

  <!-- 加载业务代码 -->
  <script src="vendor/jszip.min.js"></script>
  <script src="vendor/jsdiff.min.js"></script>
  <script src="enums.js"></script>
  <script src="utils.js"></script>
  <script src="events.js"></script>
  <script src="db.js"></script>
  <script src="store.js"></script>
  <script src="ui-modal.js"></script>
  <script src="ai-service.js"></script>
  <script src="flow-engine.js"></script>
  <script src="recap-engine.js"></script>
  <script src="export-service.js"></script>
  <script src="import-service.js"></script>
  <script src="ui-category.js"></script>
  <script src="ui-detail.js"></script>
  <script src="ui-editor.js"></script>
  <script src="ui-chat.js"></script>
  <script src="ui-status.js"></script>
  <script src="ui-menu.js"></script>
  <script src="ui-ai-config.js"></script>
  <script src="ui-role-config.js"></script>
  <script src="ui-flow-config.js"></script>
  <script src="template-service.js"></script>
  <script src="log-service.js"></script>
  <script src="ui-template.js"></script>
  <script src="ui-log.js"></script>
  <script src="ui-prompt-opt.js"></script>
  <script src="ui-setting-update.js"></script>
  <script src="ui-book.js"></script>
  <script src="ui-sidebar.js"></script>
  <script>window.TestRunner = window.TestRunner || {};</script>
  <script src="app.js"></script>

  <!-- 测试代码 -->
  <script src="test.js"></script>
</body>
</html>
