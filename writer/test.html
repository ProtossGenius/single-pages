<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writer 测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; background: #f8fafc; }
    h1 { margin-bottom: 16px; color: #0f172a; }
    .test-summary { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 16px; font-weight: 600; }
    .test-summary.all-pass { background: #dcfce7; color: #16a34a; }
    .test-summary.has-fail { background: #fee2e2; color: #dc2626; }
    .test-group { margin-bottom: 16px; }
    .test-group-title { font-size: 14px; font-weight: 700; color: #334155; padding: 8px 0; border-bottom: 1px solid #e2e8f0; margin-bottom: 4px; }
    .test-item { display: flex; align-items: flex-start; gap: 8px; padding: 4px 8px; font-size: 13px; }
    .test-item.pass { color: #16a34a; }
    .test-item.fail { color: #dc2626; }
    .test-icon { font-weight: bold; flex-shrink: 0; width: 18px; }
    .test-name { flex: 1; }
    .test-error { font-size: 12px; color: #dc2626; padding: 4px 8px 4px 34px; white-space: pre-wrap; background: #fef2f2; border-radius: 4px; margin: 2px 0 4px; }
    #test-log { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Writer 单元测试</h1>
  <div id="test-summary" class="test-summary">运行中...</div>
  <div id="test-log"></div>

  <!-- 模态容器 (测试 ui-modal 用) -->
  <div id="modal-container"></div>

  <!-- 类目管理器测试容器 -->
  <div id="test-category-container" style="display:none;">
    <div id="category-panel" class="panel panel-category">
      <div class="panel-header">
        <span class="panel-title">类目管理器</span>
        <button id="btn-add-root-category" class="btn-icon" title="添加大类">+</button>
      </div>
      <div id="category-tree" class="category-tree"></div>
    </div>
  </div>
  <div id="detail-panel" style="display:none;"></div>

  <!-- 加载样式 -->
  <link rel="stylesheet" href="style.css">

  <!-- 加载业务代码 -->
  <script src="vendor/jszip.min.js"></script>
  <script src="enums.js"></script>
  <script src="utils.js"></script>
  <script src="events.js"></script>
  <script src="db.js"></script>
  <script src="store.js"></script>
  <script src="ui-modal.js"></script>
  <script src="ai-service.js"></script>
  <script src="flow-engine.js"></script>
  <script src="recap-engine.js"></script>
  <script src="export-service.js"></script>
  <script src="import-service.js"></script>
  <script src="ui-category.js"></script>
  <script src="ui-detail.js"></script>
  <script src="ui-editor.js"></script>
  <script src="ui-chat.js"></script>
  <script src="ui-status.js"></script>
  <script src="ui-menu.js"></script>
  <script src="ui-ai-config.js"></script>
  <script src="ui-role-config.js"></script>
  <script src="ui-flow-config.js"></script>
  <script src="template-service.js"></script>
  <script src="ui-template.js"></script>
  <script src="ui-book.js"></script>
  <script src="ui-sidebar.js"></script>

  <!-- 测试代码 -->
  <script src="test.js"></script>
</body>
</html>
