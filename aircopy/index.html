<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirCopy - WebRTC 文件传输</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 连接前界面 -->
        <div id="connection-setup" class="screen">
            <div class="header">
                <h1>AirCopy</h1>
                <div class="usage-help">
                    <p class="usage-title">使用帮助</p>
                    <div class="usage-list" role="list">
                        <p class="usage-item">
                            打开 <span id="base-url-text" class="usage-url"></span>，另一端可用微信/系统相机扫描二维码连接。
                        </p>
                        <p class="usage-divider" aria-hidden="true">或者</p>
                        <p class="usage-item">双方都打开网页后，一端展示二维码，另一端点击“开始扫码”用内置扫码连接。</p>
                    </div>
                </div>
            </div>
            
            <div class="content">
                <div id="qr-container" class="toggle-content">
                    <div id="qrcode"></div>
                    <p class="hint">支持双击放大，可用微信、系统相机或任意扫码工具扫描。</p>
                </div>
                
                <div id="scanner-container" class="toggle-content hidden">
                    <div id="scanner-shell" class="scanner-shell">
                        <div id="reader"></div>
                        <div class="scanner-overlay">
                            <span class="corner tl"></span>
                            <span class="corner tr"></span>
                            <span class="corner bl"></span>
                            <span class="corner br"></span>
                            <div class="scan-line"></div>
                        </div>
                    </div>
                    <p class="hint">点击下方按钮后，用内置扫码读取对方页面的连接二维码。</p>
                </div>

                <div class="controls">
                    <button id="toggle-method">切换到扫描框</button>
                    <button id="scan-trigger" class="hidden">开始扫码</button>
                    <button id="regen-offer">刷新二维码</button>
                    <button id="enlarge-qr">放大二维码</button>
                    <button id="back-to-chat" class="hidden">返回会话</button>
                </div>

                <div class="user-info">
                    <label for="display-name">展示名：</label>
                    <input type="text" id="display-name" placeholder="请输入您的名字" value="用户_">
                </div>

                <p id="status-text" class="status-text">正在初始化…</p>
            </div>
        </div>

        <!-- 连接后界面 -->
        <div id="chat-interface" class="screen hidden">
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-header-main">
                        <h3>会话</h3>
                        <button id="settings-toggle" class="settings-toggle" type="button" aria-label="打开设置">☰</button>
                    </div>
                    <div id="sidebar-settings" class="sidebar-settings hidden">
                        <label class="setting-row" for="hang-mode-toggle">
                            <span>挂机模式</span>
                            <input id="hang-mode-toggle" type="checkbox" />
                        </label>
                    </div>
                </div>
                <ul id="session-list">
                    <li class="session-item active" data-id="group-chat">
                        <span class="avatar">G</span>
                        <span id="peer-session-name" class="name">当前会话</span>
                        <span id="peer-session-status" class="session-status offline">离线</span>
                        <span id="peer-session-unread" class="session-unread hidden">0</span>
                    </li>
                </ul>
            </div>
            
            <div class="main-chat">
                <div class="chat-header">
                    <button id="session-toggle" class="session-toggle" type="button">
                        <span id="chat-title" class="chat-title-text">当前会话</span>
                        <span id="chat-status" class="chat-status offline">离线</span>
                        <span id="chat-unread" class="unread-badge hidden">0</span>
                    </button>
                    <div class="header-actions">
                        <button id="open-connector">连接更多</button>
                        <button id="exit-chat">退出</button>
                    </div>
                </div>
                
                <div id="chat-messages" class="messages-container">
                    <!-- 消息将在这里动态生成 -->
                </div>
                
                <div class="chat-input-area">
                    <div class="input-actions">
                        <button id="send-file" disabled>文件</button>
                        <button id="send-emoji" disabled>表情</button>
                        <button id="record-voice" disabled>语音</button>
                        <button id="video-call" disabled>视频</button>
                        <input id="file-input" type="file" class="hidden" />
                    </div>
                    <div id="emoji-panel" class="emoji-panel hidden" aria-label="表情面板"></div>
                    <div class="input-wrapper">
                        <textarea id="message-input" placeholder="输入消息..."></textarea>
                        <button id="send-btn">发送</button>
                    </div>
                </div>
            </div>

            <div id="session-backdrop" class="session-backdrop"></div>
        </div>
    </div>

    <div id="qr-modal" class="qr-modal hidden">
        <button id="qr-modal-close" class="qr-modal-close">关闭</button>
        <div id="qrcode-large" class="qrcode-large"></div>
    </div>

    <div id="video-modal" class="video-modal hidden">
        <div class="video-card">
            <div class="video-card-header">
                <strong>视频通话</strong>
                <span id="video-status">未开始</span>
            </div>
            <div class="video-settings">
                <label>
                    <input id="video-show-toggle" type="checkbox" checked />
                    展示我的画面
                </label>
            </div>
            <div class="video-grid">
                <div class="video-pane">
                    <span>对方画面</span>
                    <video id="remote-video" autoplay playsinline></video>
                </div>
                <div class="video-pane">
                    <span>本地画面</span>
                    <video id="local-video" autoplay playsinline muted></video>
                </div>
            </div>
            <div id="incoming-call-actions" class="video-actions hidden">
                <button id="accept-video-call">接听</button>
                <button id="reject-video-call" class="danger">挂断</button>
            </div>
            <div class="video-actions">
                <button id="hangup-video" class="danger">挂断</button>
                <button id="close-video-modal" class="secondary">关闭窗口</button>
            </div>
        </div>
    </div>

    <div id="file-offer-modal" class="file-offer-modal hidden">
        <div class="file-offer-card">
            <h3>收到文件</h3>
            <p id="file-offer-text">对方正在发送文件</p>
            <p class="hint">接受后会优先让你选择保存位置；若暂未选择，将先缓存到内存。</p>
            <div class="file-offer-actions">
                <button id="accept-file-offer">接受并继续</button>
                <button id="reject-file-offer" class="danger">拒绝并断开</button>
            </div>
        </div>
    </div>

    <!-- 应用逻辑（第三方依赖由 main.js 动态加载并做多源回退） -->
    <script src="peer-manager.js"></script>
    <script src="main.js"></script>
</body>
</html>
